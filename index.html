<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeMusic Player</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#121212] text-white font-sans min-h-screen flex flex-col justify-between select-none">

    <header class="p-4 bg-[#000000] sticky top-0 z-10">
        <div class="flex items-center bg-[#242424] px-3 py-2 rounded-full">
            <i class="fas fa-search text-gray-400 mr-2"></i>
            <input type="text" id="search-input" placeholder="O que você quer ouvir?"
                   class="bg-transparent w-full focus:outline-none text-sm text-white">
            <button id="search-btn" class="text-green-500 font-semibold text-sm px-2">Buscar</button>
        </div>
    </header>

    <main class="flex-1 p-4 overflow-y-auto mb-24">
        <h2 class="text-xl font-bold mb-4" id="list-title">Músicas Recomendadas</h2>
        <div id="results-container" class="space-y-4">
            <p class="text-gray-400 text-sm">Digite algo na barra de busca para começar...</p>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-[#181818] border-t border-[#282828] p-4 flex flex-col gap-2">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img id="current-thumb" src="https://via.placeholder.com/50" class="w-12 h-12 rounded object-cover">
                <div>
                    <h4 id="current-title" class="text-sm font-semibold truncate w-48">Nenhuma música tocando</h4>
                    <p id="current-channel" class="text-xs text-gray-400 truncate w-48">-</p>
                </div>
            </div>
            <button class="text-gray-400 hover:text-white"><i class="far fa-heart"></i></button>
        </div>

        <div class="flex flex-col items-center gap-1 w-full">
            <div class="flex items-center gap-6 text-xl">
                <button class="text-gray-400 hover:text-white text-sm"><i class="fas fa-random"></i></button>
                <button id="prev-btn" class="text-gray-400 hover:text-white"><i class="fas fa-step-backward"></i></button>
                <button id="play-btn" class="bg-white text-black w-10 h-10 rounded-full flex items-center justify-center hover:scale-105 transition">
                    <i class="fas fa-play ml-0.5" id="play-icon"></i>
                </button>
                <button id="next-btn" class="text-gray-400 hover:text-white"><i class="fas fa-step-forward"></i></button>
                <button class="text-gray-400 hover:text-white text-sm"><i class="fas fa-redo"></i></button>
            </div>
        </div>
    </footer>

    <div id="yt-player" class="hidden"></div>

    <script src="app.js"></script>
    <script>
        // Registra o Service Worker para virar PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
