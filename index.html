<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TubeMusic Premium</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-player {
            background: rgba(24, 24, 24, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        ::-webkit-scrollbar { display: none; }
        
        /* Ajuste fino visual para a barra de arrastar */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1db954;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-[#0b0b0b] text-white font-sans min-h-screen flex flex-col justify-between select-none antialiased">

    <header class="p-4 bg-[#0b0b0b] sticky top-0 z-10 border-b border-[#1f1f1f] space-y-3">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight" id="header-title">Minha Biblioteca</h1>
            <div class="flex gap-2">
                <button id="create-playlist-btn" class="hidden bg-[#242424] hover:bg-[#2a2a2a] text-[#1db954] font-bold text-xs px-3 py-1.5 rounded-full uppercase tracking-wider">
                    <i class="fas fa-folder-plus mr-1"></i> Criar Playlist
                </button>
                <button id="refresh-covers-btn" class="bg-[#242424] hover:bg-[#2a2a2a] text-gray-300 text-xs px-3 py-1.5 rounded-full uppercase tracking-wider" title="Buscar capas que ainda faltam">
                    <i class="fas fa-image"></i>
                </button>
                <button id="toggle-add-btn" class="bg-[#1db954] text-black font-bold text-xs px-3 py-1.5 rounded-full uppercase tracking-wider">
                    <i class="fas fa-plus mr-1"></i> Nova Música
                </button>
            </div>
        </div>

        <div class="flex gap-4 text-sm font-medium border-b border-zinc-800 pb-1">
            <button id="tab-tracks" class="text-[#1db954] border-b-2 border-[#1db954] pb-1 px-1">Músicas</button>
            <button id="tab-playlists" class="text-gray-400 pb-1 px-1 hover:text-white">Playlists</button>
        </div>

        <div id="search-container" class="relative">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
            <input type="text" id="search-input" placeholder="Buscar música ou artista..."
                   class="w-full bg-[#141414] border border-[#282828] rounded-full py-2 pl-9 pr-4 text-sm text-white placeholder-gray-500 outline-none focus:border-[#1db954]">
        </div>

        <div id="add-music-form" class="hidden space-y-2 mt-3 bg-[#141414] p-3 rounded-xl border border-[#282828]">
            <label class="block w-full text-center bg-[#242424] hover:bg-[#2a2a2a] text-gray-300 text-sm py-4 px-4 rounded-lg border border-dashed border-gray-600 cursor-pointer transition-colors">
                <i class="fas fa-cloud-upload-alt mr-2 text-[#1db954] text-lg"></i> Escolher arquivos .opus / .mp3
                <input type="file" id="audio-files" accept=".opus,.ogg,.mp3" multiple class="hidden">
            </label>
            <div id="selected-files-count" class="text-xs text-gray-400 text-center mt-1">Nenhum arquivo selecionado</div>
            <button id="save-track-btn" class="w-full bg-white text-black font-bold text-sm py-2 rounded-lg transition active:scale-95 mt-2">
                Salvar na Biblioteca Local
            </button>
        </div>
    </header>

    <main class="flex-1 p-4 overflow-y-auto pb-32">
        <div id="playlist-container" class="space-y-3"></div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 glass-player border-t border-[#282828]/50 p-4 pb-6 flex flex-col gap-3 z-20 rounded-t-2xl">
        <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0 flex-1">
                <div id="current-thumb-container" class="relative w-12 h-12 rounded-lg bg-zinc-800 flex items-center justify-center border border-white/5 shadow-lg overflow-hidden">
                    <img id="current-thumb-img" class="hidden absolute inset-0 w-full h-full object-cover" alt="Capa do álbum">
                    <i class="fas fa-music text-gray-400 text-lg" id="current-icon"></i>
                </div>
                <div class="min-w-0 flex-1">
                    <h4 id="current-title" class="text-sm font-medium text-white truncate">Nenhuma música tocando</h4>
                    <p id="current-channel" class="text-xs text-gray-400 truncate mt-0.5">-</p>
                </div>
            </div>
            <button class="text-gray-400 hover:text-white transition-colors"><i class="far fa-heart text-lg"></i></button>
        </div>

        <div class="w-full flex items-center gap-2 text-xs text-gray-400 select-none">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" value="0" max="100" 
                   class="flex-1 h-1 bg-gray-700 rounded-full appearance-none outline-none accent-[#1db954] cursor-pointer">
            <span id="total-duration">0:00</span>
        </div>

        <div class="flex items-center justify-between px-8 mt-1">
            <button id="shuffle-btn" class="text-gray-500 text-sm transition-colors"><i class="fas fa-random"></i></button>
            <button id="prev-btn" class="text-gray-300 text-lg"><i class="fas fa-step-backward"></i></button>
            
            <button id="play-btn" class="bg-white text-black w-12 h-12 rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform">
                <i class="fas fa-play text-lg ml-0.5" id="play-icon"></i>
            </button>
            
            <button id="next-btn" class="text-gray-300 text-lg"><i class="fas fa-step-forward"></i></button>
            <button class="text-[#1db954] text-sm"><i class="fas fa-redo"></i></button>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registrado com sucesso para rodar Offline!"))
            .catch(err => console.error("Erro no SW:", err));
        }
    </script>
</body>
</html>
