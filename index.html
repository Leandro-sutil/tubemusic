<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TubeMusic Premium</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-player {
            background: rgba(24, 24, 24, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0b0b0b] text-white font-sans min-h-screen flex flex-col justify-between select-none antialiased">

    <header class="p-4 bg-[#0b0b0b] sticky top-0 z-10 border-b border-[#1f1f1f]">
        <div class="flex items-center justify-between mb-3">
            <h1 class="text-xl font-bold tracking-tight">Minha Biblioteca</h1>
            <button id="toggle-add-btn" class="bg-[#1db954] text-black font-bold text-xs px-3 py-1.5 rounded-full uppercase tracking-wider">
                <i class="fas fa-plus mr-1"></i> Nova Música
            </button>
        </div>

        <div id="add-music-form" class="hidden space-y-2 mt-3 bg-[#141414] p-3 rounded-xl border border-[#282828]">
            <input type="text" id="track-title" placeholder="Nome da Música" 
                   class="bg-[#242424] w-full focus:outline-none text-sm p-2 rounded-lg text-white placeholder-gray-500">
            <input type="text" id="track-author" placeholder="Nome do Artista / Canal" 
                   class="bg-[#242424] w-full focus:outline-none text-sm p-2 rounded-lg text-white placeholder-gray-500">
            <input type="text" id="track-url" placeholder="Cole o link do YouTube aqui" 
                   class="bg-[#242424] w-full focus:outline-none text-sm p-2 rounded-lg text-white placeholder-gray-500">
            <button id="save-track-btn" class="w-full bg-white text-black font-bold text-sm py-2 rounded-lg transition active:scale-95">
                Salvar na Playlist
            </button>
        </div>
    </header>

    <main class="flex-1 p-4 overflow-y-auto pb-32">
        <div id="playlist-container" class="space-y-3">
            </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 glass-player border-t border-[#282828]/50 p-4 pb-6 flex flex-col gap-3 z-20 rounded-t-2xl">
        <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0 flex-1">
                <img id="current-thumb" src="https://via.placeholder.com/150" class="w-12 h-12 rounded-lg object-cover shadow-lg border border-white/5">
                <div class="min-w-0 flex-1">
                    <h4 id="current-title" class="text-sm font-medium text-white truncate">Nenhuma música tocando</h4>
                    <p id="current-channel" class="text-xs text-gray-400 truncate mt-0.5">-</p>
                </div>
            </div>
            <button class="text-gray-400 hover:text-white transition-colors"><i class="far fa-heart text-lg"></i></button>
        </div>

        <div class="w-full bg-gray-700 h-1 rounded-full overflow-hidden">
            <div id="progress-bar" class="bg-[#1db954] h-full w-0 transition-all duration-300"></div>
        </div>

        <div class="flex items-center justify-between px-8 mt-1">
            <button class="text-gray-500 text-sm"><i class="fas fa-random"></i></button>
            <button id="prev-btn" class="text-gray-300 text-lg"><i class="fas fa-step-backward"></i></button>
            
            <button id="play-btn" class="bg-white text-black w-12 h-12 rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform">
                <i class="fas fa-play text-lg ml-0.5" id="play-icon"></i>
            </button>
            
            <button id="next-btn" class="text-gray-300 text-lg"><i class="fas fa-step-forward"></i></button>
            <button class="text-[#1db954] text-sm"><i class="fas fa-redo"></i></button>
        </div>
    </footer>

    <div id="yt-player" class="hidden"></div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
